paths:
  /api/users/register:
    post:
      summary: Registrar un nuevo usuario en la plataforma
      description: Permite registrar un usuario nuevo en el sistema con un carrito asociado.
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegisterInput'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserRegisterInput'
      responses:
        200:
          description: Registro exitoso, renderiza la vista de éxito.
        400:
          description: Entrada inválida o email ya registrado.
        500:
          description: Error interno del servidor.

  /api/users/login:
    post:
      summary: Iniciar sesión de un usuario
      description: Autentica un usuario mediante su correo electrónico y contraseña, emitiendo una cookie JWT.
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserLoginInput'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserLoginInput'
      responses:
        200:
          description: Autenticación exitosa y redirección a la vista de usuario actual.
        401:
          description: Contraseña incorrecta o usuario no encontrado.
        500:
          description: Error interno del servidor.

  /api/users/logout:
    post:
      summary: Cerrar sesión del usuario actual
      description: Limpia la cookie JWT del navegador y redirige a la vista de login.
      tags:
        - Users
      responses:
        200:
          description: Cierre de sesión exitoso y redirección.

components:
  schemas:
    UserRegisterInput:
      type: object
      required:
        - first_name
        - email
        - password
      properties:
        first_name:
          type: string
          description: Nombre de pila del usuario.
          example: Juan
        last_name:
          type: string
          description: Apellido del usuario.
          example: Pérez
        email:
          type: string
          format: email
          description: Correo electrónico único para registrarse.
          example: juan.perez@example.com
        age:
          type: integer
          description: Edad del usuario.
          example: 30
        password:
          type: string
          format: password
          description: Contraseña del usuario.
          example: Secreto123

    UserLoginInput:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          description: Correo electrónico del usuario registrado.
          example: juan.perez@example.com
        password:
          type: string
          format: password
          description: Contraseña del usuario.
          example: Secreto123
